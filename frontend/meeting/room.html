<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Meeting Room</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/meeting.css?v=3" />
  </head>
  <body class="meeting-page">
    <header class="meeting-topbar">
      <div class="meeting-title" id="room-label">Meeting Room</div>
      <div class="meeting-meta">
        <span id="timer">00:00:00</span>
        <span id="participant-count">0 participants</span>
        <div class="rec-badge" id="rec-badge">
          <span class="rec-dot"></span> REC
        </div>
      </div>
    </header>

    <main class="meeting-main">
      <section class="meeting-stage">
        <div class="participant-count-large" id="count-display">0</div>
        <p style="color: var(--text-muted); margin: 0">in this call</p>
        <div class="participant-avatars" id="avatar-grid"></div>
      </section>

      <aside class="sidebar-panel">
        <div class="panel-header">Participants</div>
        <div class="participant-list" id="participant-list"></div>
      </aside>
    </main>

    <footer class="meeting-controls" id="meeting-controls">
      <div class="controls-grid">
        <button
          type="button"
          class="control-btn control-mute"
          id="btn-mute"
          title="Mute microphone"
          disabled
        >
          <svg class="control-icon" id="icon-mic-on" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
          <svg class="control-icon" id="icon-mic-off" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" hidden>
            <path fill="currentColor" d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3s-3 1.34-3 3v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/>
          </svg>
        </button>
        <button type="button" class="control-btn control-leave" id="btn-leave" disabled>
          Leave
        </button>
        <button type="button" class="control-btn control-host control-start" id="btn-start" hidden>
          Start meeting
        </button>
        <button type="button" class="control-btn control-host control-end" id="btn-end" hidden>
          End meeting
        </button>
      </div>
    </footer>

    <div class="modal-overlay" id="download-modal" hidden>
      <div class="modal card" style="text-align: center; max-width: 420px">
        <h2 style="margin-top: 0">Recording ready</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem">
          The meeting audio stays on your device only. Nothing is uploaded or saved on the server.
        </p>
        <audio id="preview-audio" controls style="width: 100%; margin: 1rem 0"></audio>
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-download-recording">Download recording</button>
          <button class="btn btn-ghost" id="btn-close-download">Back to lobby</button>
        </div>
      </div>
    </div>

    <script src="/js/env-config.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/download.js"></script>
    <script src="/js/mixed-recorder.js"></script>
    <script src="/js/webrtc-meeting.js"></script>
    <script>
      if (!Auth.requireAuth()) throw new Error("auth");

      const params = new URLSearchParams(location.search);
      const roomId = params.get("roomId");
      const user = Auth.getUser();

      if (!roomId) {
        window.location.href = "/meeting/index.html";
      }

      let isHost = false;
      let meeting = null;
      let timerInterval = null;
      let meetingStartTime = null;
      let meetingStartedAt = null;
      let roomCode = "";
      let pendingRecordingBlob = null;
      let pendingRecordingName = "";

      const recBadge = document.getElementById("rec-badge");
      const btnStart = document.getElementById("btn-start");
      const btnEnd = document.getElementById("btn-end");
      const btnMute = document.getElementById("btn-mute");
      const btnLeave = document.getElementById("btn-leave");
      const iconMicOn = document.getElementById("icon-mic-on");
      const iconMicOff = document.getElementById("icon-mic-off");
      const meetingControls = document.getElementById("meeting-controls");

      function syncControlsLayout() {
        if (!meetingControls) return;
        const isMobile = window.matchMedia("(max-width: 768px)").matches;
        const h = Math.ceil(meetingControls.offsetHeight);
        document.documentElement.style.setProperty("--meeting-controls-height", `${h}px`);

        if (!isMobile) {
          meetingControls.style.bottom = "";
          return;
        }

        if (window.visualViewport) {
          const vv = window.visualViewport;
          const gap = Math.max(0, window.innerHeight - (vv.offsetTop + vv.height));
          meetingControls.style.bottom = `${Math.ceil(gap)}px`;
        } else {
          meetingControls.style.bottom = "0px";
        }
      }

      if (window.ResizeObserver && meetingControls) {
        new ResizeObserver(syncControlsLayout).observe(meetingControls);
      }
      window.addEventListener("resize", syncControlsLayout);
      window.addEventListener("orientationchange", () => {
        setTimeout(syncControlsLayout, 150);
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", syncControlsLayout);
        window.visualViewport.addEventListener("scroll", syncControlsLayout);
      }

      const listRows = new Map();
      const avatarTiles = new Map();

      function formatTimer(ms) {
        const s = Math.floor(ms / 1000);
        const h = String(Math.floor(s / 3600)).padStart(2, "0");
        const m = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
        const sec = String(s % 60).padStart(2, "0");
        return `${h}:${m}:${sec}`;
      }

      function startTimer() {
        meetingStartTime = Date.now();
        timerInterval = setInterval(() => {
          document.getElementById("timer").textContent = formatTimer(
            Date.now() - meetingStartTime
          );
        }, 1000);
      }

      function renderParticipants(list, count) {
        document.getElementById("count-display").textContent = count;
        document.getElementById("participant-count").textContent =
          `${count} participant${count === 1 ? "" : "s"}`;

        const listEl = document.getElementById("participant-list");
        const grid = document.getElementById("avatar-grid");
        const seen = new Set();

        for (const p of list) {
          seen.add(p.peerId);
          const hostLabel = p.isHost ? " (Host)" : "";
          const statusText = p.muted ? "Muted" : "Connected";
          const initial = (p.displayName || "?")[0].toUpperCase();

          let row = listRows.get(p.peerId);
          if (!row) {
            row = document.createElement("div");
            row.className = "participant-row";
            row.dataset.peerId = p.peerId;
            row.innerHTML = `
              <span class="status-dot"></span>
              <div class="participant-info">
                <div class="name"></div>
                <div class="role"></div>
              </div>`;
            listEl.appendChild(row);
            listRows.set(p.peerId, row);
          }
          row.querySelector(".name").textContent = `${p.displayName}${hostLabel}`;
          row.querySelector(".role").textContent = statusText;

          let tile = avatarTiles.get(p.peerId);
          if (!tile) {
            tile = document.createElement("div");
            tile.className = "avatar-tile";
            tile.dataset.peerId = p.peerId;
            tile.innerHTML = `
              <div class="avatar-circle"></div>
              <div class="avatar-name"></div>`;
            grid.appendChild(tile);
            avatarTiles.set(p.peerId, tile);
          }
          const circle = tile.querySelector(".avatar-circle");
          circle.textContent = initial;
          circle.classList.toggle("muted", !!p.muted);
          tile.querySelector(".avatar-name").textContent = p.displayName;
        }

        for (const [peerId, row] of listRows) {
          if (!seen.has(peerId)) {
            row.remove();
            listRows.delete(peerId);
          }
        }
        for (const [peerId, tile] of avatarTiles) {
          if (!seen.has(peerId)) {
            tile.remove();
            avatarTiles.delete(peerId);
          }
        }
      }

      async function initMeeting() {
        try {
          const room = await API.getRoom(roomId);
          roomCode = room.roomCode;
          isHost = room.isHost;
          document.getElementById("room-label").textContent =
            `Room ${room.roomCode} · ${room.hostName}`;

          if (isHost) {
            btnStart.hidden = false;
          }
          requestAnimationFrame(syncControlsLayout);

          meeting = new WebRTCMeeting({
            roomId,
            isHost,
            displayName: user.name,
            userId: user.id,
            onParticipantUpdate: renderParticipants,
            onNotification: showToast,
            onMeetingStarted: () => {
              recBadge.classList.add("active");
              if (!timerInterval) startTimer();
            },
            onMeetingEnded: () => {
              recBadge.classList.remove("active");
              showToast("Meeting ended by host");
            },
          });

          await meeting.init();
          meetingControls.classList.add("ready");
          btnMute.disabled = false;
          btnLeave.disabled = false;
        } catch (e) {
          showToast(e.message || "Could not join meeting");
          setTimeout(() => (window.location.href = "/meeting/index.html"), 2000);
        }
      }

      btnMute.addEventListener("click", () => {
        if (!meeting) return;
        const muted = meeting.toggleMute();
        btnMute.classList.toggle("muted", muted);
        iconMicOn.hidden = muted;
        iconMicOff.hidden = !muted;
      });

      btnStart.addEventListener("click", async () => {
        try {
          await meeting.startMeetingRecording();
          const res = await API.startMeeting(roomId);
          meetingStartedAt = res.startedAt;
          recBadge.classList.add("active");
          startTimer();
          btnStart.hidden = true;
          btnEnd.hidden = false;
          requestAnimationFrame(syncControlsLayout);
          showToast("Meeting started — recording all participants");
        } catch (e) {
          showToast(e.message);
        }
      });

      function showDownloadModal(blob) {
        pendingRecordingBlob = blob;
        pendingRecordingName = meetingRecordingFilename(roomCode, roomId);
        const modal = document.getElementById("download-modal");
        const preview = document.getElementById("preview-audio");
        preview.src = URL.createObjectURL(blob);
        modal.hidden = false;
        modal.classList.add("open");
        downloadBlob(blob, pendingRecordingName);
        showToast("Download started — file is not stored on the server");
      }

      document.getElementById("btn-download-recording").addEventListener("click", () => {
        if (pendingRecordingBlob) {
          downloadBlob(pendingRecordingBlob, pendingRecordingName);
        }
      });

      document.getElementById("btn-close-download").addEventListener("click", () => {
        meeting?.destroy();
        window.location.href = "/meeting/index.html";
      });

      btnEnd.addEventListener("click", async () => {
        if (!confirm("End meeting for everyone? You can download the recording to your device."))
          return;
        try {
          const { blob } = await meeting.stopMeetingRecording();
          await API.endMeeting(roomId);
          recBadge.classList.remove("active");
          if (timerInterval) clearInterval(timerInterval);
          showDownloadModal(blob);
          meeting.destroy();
          meeting = null;
        } catch (e) {
          showToast(e.message);
        }
      });

      document.getElementById("btn-leave").addEventListener("click", () => {
        if (!meeting) return;
        meeting.destroy();
        window.location.href = "/meeting/index.html";
      });

      initMeeting();
      requestAnimationFrame(syncControlsLayout);
    </script>
  </body>
</html>
